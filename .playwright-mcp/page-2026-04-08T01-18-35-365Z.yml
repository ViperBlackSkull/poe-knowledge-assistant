  - generic [ref=e33]: "# ============================================================================= # POE Knowledge Assistant - Environment Configuration # ============================================================================= # # This file contains all configuration options for the POE Knowledge Assistant. # Copy this file to .env and customize the values for your environment. # # USAGE: # cp .env.example .env # # Edit .env with your actual values # # VALIDATION: # - Required fields are marked with [REQUIRED] # - Optional fields are marked with [OPTIONAL] # - Fields with defaults work without modification in development # # SECURITY WARNING: # - Never commit .env files to version control # - Always use strong, unique SECRET_KEY in production # - Rotate API keys regularly # - Use environment-specific credentials # # ============================================================================= # ============================================================================= # SECTION 1: APPLICATION METADATA # ============================================================================= # Basic application information displayed in logs and API responses. # [OPTIONAL] Application display name # Default: POE Knowledge Assistant APP_NAME=POE Knowledge Assistant # [OPTIONAL] Application version string # Default: 1.0.0 APP_VERSION=1.0.0 # [REQUIRED] Application environment # Options: development, testing, production # Validation: Must be one of the valid environment values # IMPORTANT: Change to 'production' for production deployments ENVIRONMENT=development # ============================================================================= # SECTION 2: SERVER CONFIGURATION # ============================================================================= # FastAPI server settings for API hosting. # All settings prefixed with API_ # [OPTIONAL] Server host address # Default: 0.0.0.0 (all interfaces) # Production recommendation: Use specific IP or reverse proxy API_HOST=0.0.0.0 # [OPTIONAL] Server port number # Default: 8000 # Validation: Must be a valid port number (1-65535) # Production recommendation: Use port 80/443 behind reverse proxy API_PORT=8000 # [OPTIONAL] Enable debug mode # Default: True in development, False recommended for production # WARNING: Never enable debug mode in production - exposes sensitive info API_DEBUG=True # [OPTIONAL] Enable auto-reload on code changes # Default: True # WARNING: Disable in production (performance impact) API_RELOAD=True # [OPTIONAL] Number of worker processes # Default: 1 # Performance: Increase for production (recommended: CPU cores * 2 + 1) # Note: Only applies when using Gunicorn/Uvicorn workers API_WORKERS=1 # ============================================================================= # SECTION 3: DATABASE CONFIGURATION # ============================================================================= # Primary database settings (PostgreSQL recommended for production). # [REQUIRED] Database connection URL # SQLite (development): sqlite:///./data/poe_knowledge.db # PostgreSQL (production): postgresql://user:password@localhost:5432/poe_knowledge # Validation: Must be a valid database URL DATABASE_URL=sqlite:///./data/poe_knowledge.db # [OPTIONAL] Connection pool size # Default: 5 # Performance: Increase for high-traffic production (10-20) # Validation: Must be positive integer DATABASE_POOL_SIZE=5 # [OPTIONAL] Maximum overflow connections # Default: 10 # Performance: Additional connections beyond pool size # Validation: Must be positive integer DATABASE_MAX_OVERFLOW=10 # ============================================================================= # SECTION 4: VECTOR DATABASE (ChromaDB) # ============================================================================= # Vector database for semantic search and RAG functionality. # All settings prefixed with CHROMA_ # [OPTIONAL] Directory for persistent storage # Default: ./data/chroma # Production: Use absolute path with proper permissions CHROMA_PERSIST_DIRECTORY=./data/chroma # [OPTIONAL] Collection name for knowledge base # Default: poe_knowledge # Use different collections for different knowledge domains CHROMA_COLLECTION_NAME=poe_knowledge # ============================================================================= # SECTION 5: LLM PROVIDER CONFIGURATION # ============================================================================= # Large Language Model provider settings. # Choose one provider and configure its specific settings. # ----------------------------------------------------------------------------- # 5.1 Provider Selection # ----------------------------------------------------------------------------- # [REQUIRED] LLM provider to use # Options: openai, anthropic, ollama, lmstudio # Validation: Must be one of the valid provider values PROVIDER=openai # ----------------------------------------------------------------------------- # 5.2 OpenAI Configuration # ----------------------------------------------------------------------------- # [REQUIRED if PROVIDER=openai] OpenAI API key # Get your key at: https://platform.openai.com/api-keys # Security: Never expose this key in client-side code # Validation: Must start with 'sk-' and be valid API key OPENAI_API_KEY=sk-your-openai-api-key-here # [OPTIONAL] OpenAI model to use # Default: gpt-4 # Options: gpt-4, gpt-4-turbo-preview, gpt-3.5-turbo, etc. # Performance: gpt-4 for quality, gpt-3.5-turbo for speed/cost OPENAI_MODEL=gpt-4 # [OPTIONAL] Response randomness/creativity # Default: 0.7 # Range: 0.0 (deterministic) to 2.0 (very creative) # Recommendation: 0.7-0.9 for general use, 0.0-0.3 for factual responses OPENAI_TEMPERATURE=0.7 # [OPTIONAL] Maximum tokens in response # Default: 2000 # Range: 1 to model's maximum (varies by model) # Performance: Higher values increase cost and latency OPENAI_MAX_TOKENS=2000 # ----------------------------------------------------------------------------- # 5.3 Anthropic Configuration # ----------------------------------------------------------------------------- # [REQUIRED if PROVIDER=anthropic] Anthropic API key # Get your key at: https://console.anthropic.com/ # Security: Never expose this key in client-side code ANTHROPIC_API_KEY=your-anthropic-api-key-here # [OPTIONAL] Anthropic model to use # Default: claude-3-sonnet-20240229 # Options: claude-3-opus-20240229, claude-3-sonnet-20240229, claude-3-haiku-20240307 # Performance: opus for quality, haiku for speed, sonnet for balance ANTHROPIC_MODEL=claude-3-sonnet-20240229 # ... (Additional sections for Ollama, LM Studio, Embedding, RAG, etc.) # ============================================================================= # SECTION 10: SECURITY SETTINGS # ============================================================================= # [REQUIRED] Secret key for JWT encoding # Default: NOT SECURE - must change for production # Validation: In production, must be changed from default # Security: Use strong random string (min 32 characters) # Generate with: python -c \"import secrets; print(secrets.token_urlsafe(32))\" SECRET_KEY=your-secret-key-change-in-production-please # ... (Additional security settings) # ============================================================================= # SECTION 12: ENVIRONMENT-SPECIFIC OVERRIDES # ============================================================================= # DEVELOPMENT ENVIRONMENT # ENVIRONMENT=development # API_DEBUG=True # DATABASE_URL=sqlite:///./data/poe_knowledge.db # LOG_LEVEL=DEBUG # TESTING ENVIRONMENT # ENVIRONMENT=testing # DATABASE_URL=sqlite:///./data/test_poe_knowledge.db # PRODUCTION ENVIRONMENT # ENVIRONMENT=production # API_DEBUG=False # DATABASE_URL=postgresql://user:password@localhost:5432/poe_knowledge # LOG_LEVEL=WARNING # ============================================================================= # SECTION 14: SECURITY BEST PRACTICES CHECKLIST # ============================================================================= # [ ] SECRET_KEY is changed from default to strong random string # [ ] API_DEBUG is set to False # [ ] API_RELOAD is set to False # [ ] All API keys are properly secured and rotated # [ ] DATABASE_URL uses secure credentials # [ ] CORS_ORIGINS is restricted to your domains only # [ ] .env file is not committed to version control # [ ] File permissions on .env are restrictive (chmod 600) # ============================================================================= # END OF CONFIGURATION # ============================================================================="