  - heading "backend/src/main.py (Health Endpoint)" [level=3] [ref=e43]
  - generic [ref=e44]: "@api_router.get(\"/health\", tags=[\"Health\"]) async def health_check(response: Response): \"\"\" Health check endpoint. Returns: dict: Health status including: - status: Overall health status (\"healthy\" or \"degraded\") - chromadb_status: ChromaDB connection status (\"connected\" or \"disconnected\") - embeddings_status: Embeddings service status (\"ready\" or \"error\") - version: Application version - chromadb_message: Detailed ChromaDB status message - embeddings_message: Detailed embeddings status message - timestamp: ISO 8601 timestamp of the health check HTTP Status Codes: - 200: System is healthy (ChromaDB connected and embeddings ready) - 503: System is degraded (ChromaDB disconnected or embeddings not ready) \"\"\" # Check ChromaDB health chromadb_health = check_chromadb_health() chromadb_status = chromadb_health.get(\"status\", \"disconnected\") chromadb_message = chromadb_health.get(\"message\", \"Unknown status\") # Check embeddings health embeddings_health = check_embeddings_health() embeddings_status = embeddings_health.get(\"status\", \"error\") embeddings_message = embeddings_health.get(\"message\", \"Unknown status\") # Determine overall status # System is \"healthy\" if both ChromaDB and embeddings are ready overall_status = \"healthy\" if ( chromadb_status == \"connected\" and embeddings_status == \"ready\" ) else \"degraded\" # Set appropriate HTTP status code if overall_status == \"healthy\": response.status_code = 200 else: response.status_code = 503 return { \"status\": overall_status, \"chromadb_status\": chromadb_status, \"embeddings_status\": embeddings_status, \"version\": settings.app_version, \"chromadb_message\": chromadb_message, \"embeddings_message\": embeddings_message, \"timestamp\": datetime.now(timezone.utc).isoformat(), }"
