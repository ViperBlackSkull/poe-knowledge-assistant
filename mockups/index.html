<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoE Knowledge Assistant - UI Redesign Mockups</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0C0C0E; color: #C8C8C8; font-family: 'Segoe UI', Georgia, serif; padding: 20px; }
h1 { color: #AF6025; font-size: 28px; margin-bottom: 30px; text-align: center; }
.mockup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1600px; margin: 0 auto; }
.mockup-card { background: #1A1A1F; border: 1px solid #3D3D44; border-radius: 4px; overflow: hidden; }
.mockup-card h2 { color: #D4A85A; padding: 12px 16px; font-size: 14px; background: #141418; border-bottom: 1px solid #3D3D44; }
.mockup-card iframe { width: 100%; height: 600px; border: none; }
.section-title { color: #AF6025; font-size: 22px; margin: 40px 0 20px; padding-bottom: 8px; border-bottom: 1px solid #3D3D44; grid-column: 1 / -1; }
.full-width { grid-column: 1 / -1; }
</style>
</head>
<body>
<h1>PoE Knowledge Assistant - UI Redesign Mockups</h1>
<div class="mockup-grid">

<div class="section-title">Current vs Proposed</div>

<div class="mockup-card">
  <h2>Current Design</h2>
  <iframe src="current-chat.html"></iframe>
</div>

<div class="mockup-card">
  <h2>Proposed: PoE In-Game UI Style</h2>
  <iframe src="proposed-chat.html"></iframe>
</div>

<div class="section-title">Component Breakdown</div>

<div class="mockup-card">
  <h2>Proposed: Header / Top Bar</h2>
  <iframe src="proposed-header.html"></iframe>
</div>

<div class="mockup-card">
  <h2>Proposed: Settings Panel</h2>
  <iframe src="proposed-settings.html"></iframe>
</div>

</div>
</body>
</html>
